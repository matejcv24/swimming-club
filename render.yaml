services:
  - type: web
    name: swimming-club-web
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /up
    preDeployCommand: php artisan migrate --force
    envVars:
      - key: APP_NAME
        value: Swimming Club Hydra
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "10000"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: 178.63.130.212
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: orientyshop_hydra
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log

  - type: worker
    name: swimming-club-worker
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    dockerCommand: /usr/local/bin/start-worker
    envVars:
      - key: APP_NAME
        value: Swimming Club Hydra
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: 178.63.130.212
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: orientyshop_hydra
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log
